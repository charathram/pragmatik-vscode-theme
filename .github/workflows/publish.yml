name: Publish extension

# Publishes the theme when you create a GitHub Release whose tag is `vX.Y.Z`
# (matching the version in package.json). Can also be run manually from the
# Actions tab via "Run workflow".
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # allow attaching the .vsix to the Release

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Guard: on a Release, the tag must match package.json's version, so you
      # never publish a stale version by forgetting to bump it.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG). Bump the version and re-tag."
            exit 1
          fi

      # Regenerate the theme JSONs from the palette so what ships always
      # matches scripts/build-themes.js.
      - name: Build themes
        run: npm run build

      - name: Package .vsix
        run: npx --yes @vscode/vsce@^3 package --no-dependencies --out pragmatik.vsix

      - name: Publish to the VS Code Marketplace
        run: npx --yes @vscode/vsce@^3 publish --no-dependencies --packagePath pragmatik.vsix

      # Optional: also publish to Open VSX (used by VSCodium, Cursor, Gitpod,
      # Eclipse Theia, etc.). Skipped automatically unless OVSX_PAT is set.
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx@latest publish pragmatik.vsix --pat "$OVSX_PAT"

      # Attach the packaged .vsix to the GitHub Release for manual installs.
      - name: Attach .vsix to the Release
        if: github.event_name == 'release'
        run: gh release upload "$GITHUB_REF_NAME" pragmatik.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
