name: Publish extension

# Publishes the theme when you create a GitHub Release whose tag is `vX.Y.Z`
# (matching the version in package.json). Can also be run manually from the
# Actions tab via "Run workflow".
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # allow attaching the .vsix to the Release

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Guard: on a Release, the tag must match package.json's version, so you
      # never publish a stale version by forgetting to bump it.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG). Bump the version and re-tag."
            exit 1
          fi

      # Regenerate the theme JSONs from the palette so what ships always
      # matches scripts/build-themes.js.
      - name: Build themes
        run: npm run build

      - name: Package .vsix
        run: npx --yes @vscode/vsce@^3 package --no-dependencies --out pragmatik.vsix

      # Attach the .vsix to the Release first, so a release always yields a
      # downloadable build regardless of whether Marketplace publishing runs.
      - name: Attach .vsix to the Release
        if: github.event_name == 'release'
        run: gh release upload "$GITHUB_REF_NAME" pragmatik.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For manual "Run workflow" runs (no Release to attach to), expose the
      # .vsix as a downloadable workflow artifact instead.
      - name: Upload .vsix artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pragmatik-vsix
          path: pragmatik.vsix

      # Publish to the VS Code Marketplace. Skipped automatically unless
      # VSCE_PAT is set, so building a .vsix never depends on Marketplace setup.
      - name: Publish to the VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce@^3 publish --no-dependencies --packagePath pragmatik.vsix

      # Also publish to Open VSX (VSCodium, Cursor, Gitpod, Eclipse Theia, etc.).
      # Skipped automatically unless OVSX_PAT is set.
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx@latest publish pragmatik.vsix --pat "$OVSX_PAT"

  # After a release, point the landing page's download button at the new .vsix
  # and push the change to main, which redeploys GitHub Pages.
  update-download-link:
    needs: publish
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Point the download button at ${{ github.ref_name }}
        run: node scripts/update-download-link.js "$GITHUB_REF_NAME"

      - name: Commit and push if changed
        run: |
          if git diff --quiet docs/index.html; then
            echo "docs/index.html already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "docs: point download link at ${GITHUB_REF_NAME}"
          git push origin main
